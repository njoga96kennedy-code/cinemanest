<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MovieFlix</title>

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
}

.poster {
  width:150px;
  cursor:pointer;
  margin:10px;
}

#modal {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:none;
  top:0;
  left:0;
}

iframe {
  width:100%;
  height:80%;
}
</style>
</head>

<body>

<h2>Click Movie Test</h2>

<img 
  class="poster"
  id="movie"
  src="https://image.tmdb.org/t/p/w300/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg"
/>

<div id="modal">
  <button id="closeBtn">Close</button>
  <iframe id="player" allow="autoplay; fullscreen"></iframe>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  console.log("JS LOADED ✅");

  const STREAM_KEY = "nx_a6c5083f70bde5a7b4c2dec92de375ac";

  const movie = document.getElementById("movie");
  const modal = document.getElementById("modal");
  const player = document.getElementById("player");
  const closeBtn = document.getElementById("closeBtn");

  movie.addEventListener("click", () => {
    console.log("CLICK WORKING ✅");

    modal.style.display = "block";

    player.src =
      `https://api.codespecters.com/embed/movie/550?apikey=${STREAM_KEY}`;
  });

  closeBtn.addEventListener("click", () => {
    modal.style.display = "none";
    player.src = "";
  });

});
</script>

</body>
</html>
