<script>

const API_KEY="1d3ae144acfb6bfcb25f70361cedcf29";
const API="https://api.themoviedb.org/3";
const IMG="https://image.tmdb.org/t/p/original";

/* NAV */
window.addEventListener("scroll",()=>{
document.getElementById("nav")
.classList.toggle("scrolled",window.scrollY>50);
});

/* HERO */
async function loadHero(){

const res=await fetch(
`${API}/trending/movie/week?api_key=${API_KEY}`
);

const data=await res.json();

const m=data.results[
Math.floor(Math.random()*data.results.length)
];

document.getElementById("hero").style.backgroundImage =
`url(${IMG+m.backdrop_path})`;

document.getElementById("hero-title").innerText = m.title;

document.getElementById("hero-desc").innerText =
m.overview;

}

/* FETCH ROW */
async function fetchRow(url,container,type,style){

const res=await fetch(url);
const data=await res.json();

container.innerHTML="";

data.results.forEach(item=>{

if(!item.poster_path && !item.backdrop_path) return;

const div=document.createElement("div");

div.classList.add(
style==="landscape"
? "poster-landscape"
: "poster-portrait"
);

const imgPath=
style==="landscape"
? item.backdrop_path
: item.poster_path;

div.innerHTML=`
<img src="${IMG+imgPath}">
<div class="overlay">${item.title || item.name}</div>
`;

div.onclick=()=>{
window.location.href=
`watch.html?id=${item.id}&type=${type}`;
};

container.appendChild(div);

});

}

/* SCROLL */
function scrollRow(id,dir){

document.getElementById(id).scrollBy({
left:dir*500,
behavior:"smooth"
});

}

/* SEARCH */
document.getElementById("search")
.addEventListener("keyup",async(e)=>{

const q=e.target.value;

if(q.length<2) return;

const res=await fetch(
`${API}/search/multi?api_key=${API_KEY}&query=${q}`
);

const data=await res.json();

const trending=document.getElementById("trending");

trending.innerHTML="";

data.results.forEach(item=>{

if(!item.poster_path) return;

const div=document.createElement("div");

div.classList.add("poster-portrait");

div.innerHTML=`
<img src="${IMG+item.poster_path}">
<div class="overlay">${item.title || item.name}</div>
`;

div.onclick=()=>{
window.location.href=
`watch.html?id=${item.id}&type=${
item.media_type==="tv"?"tv":"movie"
}`;
};

trending.appendChild(div);

});

});

/* LOAD */
loadHero();

fetchRow(
`${API}/trending/movie/week?api_key=${API_KEY}`,
document.getElementById("trending"),
"movie",
"landscape"
);

fetchRow(
`${API}/movie/top_rated?api_key=${API_KEY}`,
document.getElementById("top"),
"movie",
"portrait"
);

fetchRow(
`${API}/discover/movie?api_key=${API_KEY}&with_genres=28`,
document.getElementById("action"),
"movie",
"portrait"
);

fetchRow(
`${API}/tv/popular?api_key=${API_KEY}`,
document.getElementById("tv"),
"tv",
"landscape"
);

</script>
