<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KENFLIX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#141414;color:white;}

/* NAVBAR */
.nav{
position:fixed;
top:0;width:100%;
display:flex;
justify-content:space-between;
padding:15px 40px;
z-index:1000;
transition:0.3s;
}

.nav.scrolled{
background:#111;
}

.logo{color:#e50914;font-size:28px;font-weight:bold;}

.search{
background:rgba(0,0,0,0.6);
border:none;
padding:10px 15px;
border-radius:20px;
color:white;
outline:none;
}

/* HERO */
.hero{
height:90vh;
display:flex;
align-items:flex-end;
padding:60px;
background-size:cover;
position:relative;
}

.hero::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:40%;
background:linear-gradient(to top,#141414,transparent);
}

.hero-content{
position:relative;
z-index:2;
max-width:600px;
}

.hero h1{font-size:60px;margin-bottom:10px;}
.hero p{color:#ddd;margin-bottom:20px;}

.buttons{
display:flex;
gap:10px;
}

.btn{
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

.play{background:white;color:black;}
.info{background:rgba(109,109,110,0.7);color:white;}

/* ROWS */
.row{
margin-top:-80px;
padding-left:40px;
margin-bottom:30px;
}

.row h2{margin-bottom:10px;}

.row-posters{
display:flex;
overflow-x:auto;
scroll-behavior:smooth;
padding:10px 0;
}

.row-posters::-webkit-scrollbar{display:none;}

.poster{
width:180px;
margin-right:10px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

.poster:hover{
transform:scale(1.2);
}

/* MOBILE */
@media(max-width:768px){
.hero{height:70vh;padding:20px;}
.hero h1{font-size:30px;}
.poster{width:130px;}
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav" id="nav">
<div class="logo">KENFLIX</div>
<input type="text" id="search" class="search" placeholder="Search...">
</div>

<!-- HERO -->
<div class="hero" id="hero">
<div class="hero-content">
<h1 id="hero-title">Loading...</h1>
<p id="hero-desc"></p>

<div class="buttons">
<button class="btn play" id="playHero">▶ Play</button>
<button class="btn info">More Info</button>
</div>

</div>
</div>

<!-- ROWS -->
<div class="row">
<h2>Trending</h2>
<div class="row-posters" id="trending"></div>
</div>

<div class="row">
<h2>Top Rated</h2>
<div class="row-posters" id="top"></div>
</div>

<div class="row">
<h2>Action Movies</h2>
<div class="row-posters" id="action"></div>
</div>

<div class="row">
<h2>TV Shows</h2>
<div class="row-posters" id="tv"></div>
</div>

<script>

const API_KEY = "1d3ae144acfb6bfcb25f70361cedcf29";
const IMG = "https://image.tmdb.org/t/p/original";
const API = "https://api.themoviedb.org/3";

let heroMovie;

/* NAV SCROLL */
window.addEventListener("scroll",()=>{
document.getElementById("nav").classList.toggle(
"scrolled",
window.scrollY > 50
);
});

/* HERO */
async function loadHero(){
const res = await fetch(`${API}/trending/movie/week?api_key=${API_KEY}`);
const data = await res.json();

heroMovie = data.results[Math.floor(Math.random()*data.results.length)];

document.getElementById("hero").style.backgroundImage =
`url(${IMG + heroMovie.backdrop_path})`;

document.getElementById("hero-title").innerText = heroMovie.title;
document.getElementById("hero-desc").innerText = heroMovie.overview;
}

/* PLAY HERO */
document.getElementById("playHero").onclick = ()=>{
window.location.href = `watch.html?id=${heroMovie.id}&type=movie`;
};

/* ROW FETCH */
async function fetchRow(url, container, type){
const res = await fetch(url);
const data = await res.json();

container.innerHTML = "";

data.results.forEach(item=>{
if(!item.poster_path) return;

const img = document.createElement("img");
img.src = IMG + item.poster_path;
img.classList.add("poster");

img.onclick = ()=>{
window.location.href =
`watch.html?id=${item.id}&type=${type}`;
};

container.appendChild(img);
});
}

/* SEARCH */
document.getElementById("search").addEventListener("keyup", async(e)=>{
const q = e.target.value;
if(q.length < 2) return;

const res = await fetch(
`${API}/search/multi?api_key=${API_KEY}&query=${q}`
);

const data = await res.json();

const trending = document.getElementById("trending");
trending.innerHTML = "";

data.results.forEach(item=>{
if(!item.poster_path) return;

const img = document.createElement("img");
img.src = IMG + item.poster_path;
img.classList.add("poster");

img.onclick = ()=>{
window.location.href =
`watch.html?id=${item.id}&type=${item.media_type === "tv" ? "tv":"movie"}`;
};

trending.appendChild(img);
});
});

/* LOAD */
loadHero();

fetchRow(`${API}/trending/movie/week?api_key=${API_KEY}`, document.getElementById("trending"), "movie");
fetchRow(`${API}/movie/top_rated?api_key=${API_KEY}`, document.getElementById("top"), "movie");
fetchRow(`${API}/discover/movie?api_key=${API_KEY}&with_genres=28`, document.getElementById("action"), "movie");
fetchRow(`${API}/tv/popular?api_key=${API_KEY}`, document.getElementById("tv"), "tv");

</script>

</body>
</html>
